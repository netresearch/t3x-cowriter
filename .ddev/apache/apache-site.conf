# Main overview page - extension source
<VirtualHost *:80>
    ServerName ${DDEV_HOSTNAME}
    DocumentRoot /var/www/t3_cowriter
    <Directory /var/www/t3_cowriter>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# TYPO3 v14
<VirtualHost *:80>
    ServerName v14.${DDEV_HOSTNAME}
    DocumentRoot /var/www/html/v14/public
    <Directory /var/www/html/v14/public>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# Documentation
<VirtualHost *:80>
    ServerName docs.${DDEV_HOSTNAME}
    DocumentRoot /var/www/html/docs
    <Directory /var/www/html/docs>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>
</VirtualHost>
