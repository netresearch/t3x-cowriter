name: Extended Testing

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  extended:
    uses: netresearch/typo3-ci-workflows/.github/workflows/extended-testing.yml@main
    permissions:
      contents: read
    with:
      php-test-suites: >-
        [
          {"suite":"unit","config":"Build/phpunit/UnitTests.xml","testsuite":"Unit Tests","flag":"php-unit"},
          {"suite":"integration","config":"Build/phpunit/IntegrationTests.xml","testsuite":"Integration Tests","flag":"php-integration"},
          {"suite":"e2e","config":"Build/phpunit/E2ETests.xml","testsuite":"E2E Tests","flag":"php-e2e"}
        ]
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      INFECTION_DASHBOARD_API_KEY: ${{ secrets.INFECTION_DASHBOARD_API_KEY }}
