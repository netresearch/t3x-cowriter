services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Netresearch\T3Cowriter\:
    resource: '../Classes/*'
    exclude:
      - '../Classes/Domain/Model/*'
      - '../Classes/Domain/DTO/*'
      - '../Classes/Service/RateLimitResult.php'

  Netresearch\T3Cowriter\Service\RateLimiterService:
    arguments:
      $requestsPerMinute: 20

  Netresearch\T3Cowriter\Service\RateLimiterInterface:
    alias: Netresearch\T3Cowriter\Service\RateLimiterService

  Netresearch\T3Cowriter\Service\ContextAssemblyServiceInterface:
    alias: Netresearch\T3Cowriter\Service\ContextAssemblyService

  Netresearch\T3Cowriter\Controller\AjaxController:
    public: true

  Netresearch\T3Cowriter\Controller\VisionController:
    public: true

  Netresearch\T3Cowriter\Controller\TranslationController:
    public: true

  Netresearch\T3Cowriter\Controller\TemplateController:
    public: true

  Netresearch\T3Cowriter\Controller\ToolController:
    public: true

  Netresearch\T3Cowriter\Controller\Backend\StatusController:
    public: true
